<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ސައިން އިން ކުރައްވާ — Poll</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="login-page-body">
    <div class="login-page">
      <div class="login-page__card">
        <img
          class="login-page__logo"
          src="logo.png"
          alt=""
          width="140"
          height="48"
        />
        <section class="login" aria-labelledby="login-title">
          <form class="login-form" id="login-form" novalidate>
            <h2 id="login-title" class="login-form__title" dir="rtl" lang="dv">
              ސައިން އިން ކުރައްވާ
            </h2>
            <p class="login-form__subtitle" dir="rtl" lang="dv">
              ތި ބޭފުޅާގެ ގޫގަލް އެކައުންޓް ބޭނުންކުރައްވައިގެން ސައިން އިން ކުރައްވާ.
            </p>
            <p
              class="login-form__notice"
              dir="rtl"
              lang="dv"
            >
              މި ޕޯލުގައި ބައިވެރިވާ ފަރާތުގެ އެއްވެސް ޒާތީ މައުލޫމާތެއް އެއްވެސް އެހެން ފަރާތަކަށް ހިއްސާ ނުކުރެވޭނެ ވާހާކަ އަދި މި ޕޯލަކީ ސިއްރު ޕޯލެއް ކަމުގައި ދަންނަވަން.
            </p>
            <p id="auth-error" class="login-form__error" role="alert" hidden></p>
            <div class="login-form__actions">
              <button
                type="button"
                id="auth-signin-google"
                class="login-form__btn-google"
                aria-label="Sign in with Gmail"
              >
                <svg
                  class="login-form__btn-google-icon"
                  width="18"
                  height="18"
                  viewBox="0 0 18 18"
                  aria-hidden="true"
                >
                  <path
                    fill="#4285F4"
                    d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"
                  />
                  <path
                    fill="#34A853"
                    d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.996 8.996 0 009 18z"
                  />
                  <path
                    fill="#FBBC05"
                    d="M3.964 10.712A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.712V4.956H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.044l3.007-2.332z"
                  />
                  <path
                    fill="#EA4335"
                    d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.956L3.964 7.288C4.672 5.163 6.656 3.58 9 3.58z"
                  />
                </svg>
                <span class="login-form__btn-google-text">Sign in with Gmail</span>
              </button>
            </div>
          </form>
        </section>
      </div>
    </div>
    <script src="firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="login.js" defer></script>
  </body>
</html>
